<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Track or Trash</h1>
        <p>Clean your playlists up by swiping</p>
    </header>
    <!-- Input fields -->
    <main id="setup">
        <div class="card">
            <h2>Connect your Spotify API</h2>
            <div class="input-group">
                <label>Client ID</label>
                <input type="text" id="client-id" placeholder="Paste your Client ID">
            </div>
            <div class="input-group">
                <label>Client Secret</label>
                <input type="password" id="client-secret" placeholder="Paste your Client Secret">
            </div>
            <button onclick="SaveKeys()">Save API credentials</button>
        </div>

    </main>
    <section id ="dashboard" class="hidden">
        <div class="card">
            <h2>Connected to Spotify API succesfully!</h2>
            <p>Your saved API credentials have been loaded.
                Press 'sign in' below to login to your account and start sorting playlists!
            </p>
            
            <button onclick="login()" id="fetch">Sign in</button>
        </div>
    </section>
    <section id ="home" class="hidden">
        <div class="card">
            <h2>Signed in!</h2>
            <p>Select a playlist below to start sorting!</p>
        </div>
        <div id="menu-container" class="menu-grid">
            
        </div>"
    </section>
    <script src="app.js"></script>
</body>
</html>
