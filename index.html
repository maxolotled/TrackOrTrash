    <header>
        <h1>Track or Trash</h1>
    </header>
    <!-- Input fields -->
    <main id="setup">
        <div class="card">
            <button id="switchToYoutube" onclick="switchToYoutube()">Use Youtube Music</button>
            <h2>Or connect your Spotify API:</h2>
            <div class="input-group">
                <label>Client ID</label>
                <input type="text" id="client-id" placeholder="Paste your Client ID">
            </div>
            <div class="input-group">
                <label>Client Secret</label>
                <input type="password" id="client-secret" placeholder="Paste your Client Secret">
            </div>
            <button id="save" onclick="SaveKeys()">Save & login to Spotify</button>
            <button id="howTo" onclick="openTutorial()">How to get API credentials?</button>
        </div>

    </main>
    <div id="toast" class="toast hidden"></div>
    <section id="dashboard" class="hidden">
        <div class="card track-card">
            <img id="track-art" src="https://placehold.co/250?text=Loading..." alt="Album Art">
            <div class="track-info">
                <h2 id="track-title">Loading Song..</h2>
                <h3 id="track-artist">Artist Name</h3>
            </div>
        </div>
        <iframe id="yt-preview-player"
                width="0"
                height="0"
                src=""
                frameborder="0"
                allow="autoplay; encrypted-media">
        </iframe>
        <div class="action-buttons">

    <section id ="home" class="hidden">
        <header>
            <h3>Select a playlist to start</h3>
        </header>
        <div id="menu-container" class="menu-grid">
