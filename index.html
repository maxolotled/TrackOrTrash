<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="logout" class="hidden" onclick="logout()">Log Out</button>
    <button id="stop" class="hidden" onclick="stopSorting()">Stop sorting</button>
    <header>
        <h1>Track or Trash</h1>
    </header>
    <!-- Input fields -->
    <main id="setup">
        <div class="card">
            <h2>Connect your Spotify API</h2>
            <div class="input-group">
                <label>Client ID</label>
                <input type="text" id="client-id" placeholder="Paste your Client ID">
            </div>
            <div class="input-group">
                <label>Client Secret</label>
                <input type="password" id="client-secret" placeholder="Paste your Client Secret">
            </div>
            <button onclick="SaveKeys()">Save API credentials</button>
            <button onclick="openTutorial()">How to get API credentials?</button>
        </div>

    </main>
    <div id="toast" class="toast hidden"></div>
    <section id="dashboard" class="hidden">
        <div class="card track-card">
            <img id="track-art" src="https://placehold.co/250?text=Loading..." alt="Album Art">
            <div class="track-info">
                <h2 id="track-title">Loading Song..</h2>
                <h3 id="track-artist">Artist Name</h3>
            </div>
        </div>
        <div class="action-buttons">
            <button id="trash" onclick="Trash()">Trash</button>
            <button id="track" onclick="Track()">Track</button>
        </div>
    </section>
    <section id ="home" class="hidden">
        <header>
            <h3>Select a playlist to start</h3>
        </header>
        <div id="menu-container" class="menu-grid">

        </div>
    </section>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="app.js"></script>
</body>
</html>
